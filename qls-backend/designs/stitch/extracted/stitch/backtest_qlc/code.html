<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ff88",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-primary {
            background: rgba(0, 255, 136, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[430px] mx-auto border-x border-white/5 shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between px-6 pt-12 pb-4 glass sticky top-0 z-10">
<button class="flex size-10 items-center justify-center rounded-full glass hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">arrow_back_ios_new</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-lg font-bold tracking-tight text-white uppercase">Backtest QLC</h1>
<span class="text-[10px] text-primary font-medium tracking-[0.2em]">QUANTUM LIQUIDITY</span>
</div>
<button class="flex size-10 items-center justify-center rounded-full glass hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-slate-100">more_horiz</span>
</button>
</header>
<main class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
<!-- Performance Chart Area -->
<div class="glass p-5 rounded-lg space-y-4">
<div class="flex justify-between items-center">
<div>
<p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Performance Estimada</p>
<h2 class="text-2xl font-bold text-primary">+24.8%</h2>
</div>
<div class="flex gap-2">
<span class="px-2 py-1 rounded bg-primary/10 text-primary text-[10px] font-bold">LIVE DATA</span>
</div>
</div>
<div class="h-32 w-full flex items-end gap-1 px-1">
<div class="bg-primary/20 w-full rounded-t-sm h-[30%]"></div>
<div class="bg-primary/20 w-full rounded-t-sm h-[45%]"></div>
<div class="bg-primary/30 w-full rounded-t-sm h-[40%]"></div>
<div class="bg-primary/40 w-full rounded-t-sm h-[60%]"></div>
<div class="bg-primary/50 w-full rounded-t-sm h-[55%]"></div>
<div class="bg-primary/60 w-full rounded-t-sm h-[80%]"></div>
<div class="bg-primary/70 w-full rounded-t-sm h-[75%]"></div>
<div class="bg-primary w-full rounded-t-sm h-[100%]"></div>
</div>
</div>
<!-- Simulation Parameters -->
<div class="space-y-4">
<h3 class="text-sm font-semibold text-slate-300 px-1 uppercase tracking-widest">Configurações de Simulação</h3>
<!-- Pair Selection -->
<div class="glass-primary p-4 rounded-lg flex flex-col gap-2">
<label class="text-[10px] font-bold text-primary uppercase tracking-wider">Par de Moedas</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">currency_exchange</span>
<select class="bg-transparent border-none text-white focus:ring-0 p-0 text-base font-medium w-full">
<option>BTC/USDT (Binance)</option>
<option>ETH/USDT (Binance)</option>
<option>SOL/USDT (OKX)</option>
</select>
</div>
</div>
<!-- Strategy Selection -->
<div class="glass p-4 rounded-lg flex flex-col gap-2">
<label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Estratégia</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">psychology</span>
<select class="bg-transparent border-none text-white focus:ring-0 p-0 text-base font-medium w-full">
<option>Quantum Liquidity V1.2</option>
<option>Mean Reversion Alpha</option>
<option>Trend Follower Pro</option>
</select>
</div>
</div>
<!-- Date Inputs -->
<div class="grid grid-cols-2 gap-4">
<div class="glass p-4 rounded-lg flex flex-col gap-2">
<label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Data Início</label>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-400 text-sm">calendar_today</span>
<input class="bg-transparent border-none text-white focus:ring-0 p-0 text-sm font-medium w-full [color-scheme:dark]" type="date" value="2023-10-01"/>
</div>
</div>
<div class="glass p-4 rounded-lg flex flex-col gap-2">
<label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Data Fim</label>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-400 text-sm">event</span>
<input class="bg-transparent border-none text-white focus:ring-0 p-0 text-sm font-medium w-full [color-scheme:dark]" type="date" value="2023-11-01"/>
</div>
</div>
</div>
</div>
<!-- Run Button -->
<button class="w-full bg-primary py-5 rounded-lg flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(0,255,136,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-black font-bold">play_arrow</span>
<span class="text-black font-bold uppercase tracking-widest text-sm">Executar Backtest via CCXT</span>
</button>
<!-- Quick Stats -->
<div class="grid grid-cols-3 gap-3 pt-2">
<div class="glass p-3 rounded-lg text-center">
<p class="text-[10px] text-slate-500 font-bold uppercase">Win Rate</p>
<p class="text-sm font-bold text-white">68.2%</p>
</div>
<div class="glass p-3 rounded-lg text-center">
<p class="text-[10px] text-slate-500 font-bold uppercase">Trades</p>
<p class="text-sm font-bold text-white">124</p>
</div>
<div class="glass p-3 rounded-lg text-center">
<p class="text-[10px] text-slate-500 font-bold uppercase">Drawdown</p>
<p class="text-sm font-bold text-red-400">-4.2%</p>
</div>
</div>
<div class="h-20"></div> <!-- Spacer for Nav -->
</main>
<!-- Bottom Navigation Bar -->
<nav class="absolute bottom-0 w-full glass border-t border-white/10 px-6 pb-8 pt-4">
<div class="flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Dashboard</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<div class="relative">
<span class="material-symbols-outlined fill-1">analytics</span>
<div class="absolute -top-1 -right-1 size-1.5 bg-primary rounded-full shadow-[0_0_5px_#00ff88]"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-tighter">Backtest</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">bolt</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Estratégia</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px] font-medium uppercase tracking-tighter">Perfil</span>
</a>
</div>
</nav>
<!-- Dynamic Glow Background -->
<div class="absolute -top-[10%] -left-[20%] size-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute -bottom-[10%] -right-[20%] size-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</div>
</body></html>

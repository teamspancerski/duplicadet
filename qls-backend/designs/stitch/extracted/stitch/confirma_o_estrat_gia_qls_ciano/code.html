<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d4ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .neon-shadow {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden pb-20">
<!-- Header -->
<div class="flex items-center bg-transparent p-6 justify-between">
<div class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10">
<span class="material-symbols-outlined">analytics</span>
</div>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Painel Quantum</h2>
</div>
<!-- Background Content (Simulated for Modal Context) -->
<div class="px-4 space-y-4 opacity-40">
<div class="h-32 w-full rounded-xl bg-surface-dark border border-slate-800 p-4">
<div class="h-2 w-24 bg-slate-800 rounded mb-2"></div>
<div class="h-4 w-48 bg-slate-700 rounded mb-4"></div>
<div class="flex gap-2">
<div class="h-12 w-full bg-slate-800 rounded-lg"></div>
<div class="h-12 w-full bg-slate-800 rounded-lg"></div>
</div>
</div>
<div class="h-64 w-full rounded-xl bg-surface-dark border border-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-slate-700">monitoring</span>
</div>
</div>
<!-- Backdrop Overlay -->
<div class="fixed inset-0 bg-black/60 z-40 backdrop-blur-sm"></div>
<!-- Centralized Modal (Popup) -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
<div class="glass-effect w-full max-w-sm rounded-xl overflow-hidden shadow-2xl">
<!-- Modal Top Graphic -->
<div class="@container">
<div class="px-4 pt-4">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-lg min-h-[160px] relative border border-primary/20" data-alt="Digital network abstract background with cyan glow" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBH9w3r08IjLVyOlTXeFzX7jQAj4TzWnV1p09rmw76zcUSzujS9XmmA9rcd733P42b16SNPqfkgngGmLohcrtox4QFx1-eCWCWQHwF2xJcOfiwPEn8P8XiySgmfww3LrPM_MRqH7ILSbzu05g7xxS8yHgV50fgQyRp3IT4VHWom7qELifzc7QeM5SSGZlZCMSejw93Xymm_NinI12vS17VAQmISHo0MAPQzDkcdIFRJDRQ35On4TJl9uLc5JMDCFRIkHWxkq0u6_xU");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 to-transparent"></div>
<div class="relative p-4">
<span class="bg-primary/20 text-primary text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-widest border border-primary/30">Live QLS Q-Liquidity</span>
</div>
</div>
</div>
</div>
<!-- Modal Content -->
<div class="px-6 py-5 text-center">
<h3 class="text-white tracking-tight text-2xl font-extrabold leading-tight">Aplicar Estratégia Vencedora</h3>
<p class="text-slate-400 text-sm font-normal leading-relaxed pt-2">
                        Você está prestes a ativar a <span class="text-primary font-semibold">QLS Quantum Liquidity</span> com execução automática em tempo real.
                    </p>
</div>
<!-- Metrics Grid -->
<div class="px-6 pb-4">
<div class="grid grid-cols-2 gap-3">
<div class="bg-white/5 border border-white/10 rounded-lg p-3 flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1">trending_up</span>
<span class="text-[10px] text-slate-500 uppercase">Win Rate</span>
<span class="text-white font-bold">78.4%</span>
</div>
<div class="bg-white/5 border border-white/10 rounded-lg p-3 flex flex-col items-center">
<span class="material-symbols-outlined text-primary mb-1">bolt</span>
<span class="text-[10px] text-slate-500 uppercase">Execução</span>
<span class="text-white font-bold">&lt; 15ms</span>
</div>
</div>
</div>
<!-- Confirmation Button -->
<div class="px-6 pb-6 pt-2 space-y-3">
<button class="w-full bg-primary text-black font-bold py-4 rounded-lg neon-shadow hover:brightness-110 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined font-bold">rocket_launch</span>
                        Confirmar e Ativar
                    </button>
<button class="w-full bg-transparent text-slate-400 text-sm font-medium py-2 hover:text-white transition-colors">
                        Cancelar Operação
                    </button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Persistent) -->
<div class="fixed bottom-0 left-0 right-0 z-[60]">
<div class="flex gap-2 border-t border-slate-800 bg-background-dark/90 backdrop-blur-md px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">bar_chart</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">bolt</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">history</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
</a>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00d4ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header / Navigation -->
<div class="flex items-center p-4 justify-between bg-transparent">
<button class="text-slate-900 dark:text-primary flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center neon-glow">
<span class="material-symbols-outlined text-background-dark font-bold">query_stats</span>
</div>
<span class="font-bold text-lg tracking-tight text-slate-900 dark:text-slate-100">QLS</span>
</div>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<div class="flex flex-col flex-1 px-6 pt-8 pb-12 max-w-md mx-auto w-full">
<!-- Hero Illustration / Branding -->
<div class="mb-10 flex justify-center">
<div class="relative group">
<div class="absolute -inset-4 bg-primary/20 blur-2xl rounded-full opacity-50"></div>
<div class="relative w-24 h-24 glass-card rounded-2xl flex items-center justify-center border-primary/30">
<span class="material-symbols-outlined text-primary text-5xl">lock_reset</span>
</div>
</div>
</div>
<!-- Content -->
<div class="text-center mb-10">
<h1 class="text-slate-900 dark:text-slate-50 text-3xl font-bold tracking-tight mb-3">Redefinir Senha</h1>
<p class="text-slate-600 dark:text-slate-400 text-base">
                    Esqueceu sua chave de acesso? Insira seu e-mail cadastrado na <span class="text-primary font-semibold">QLS Quantum</span> para recuperar sua conta.
                </p>
</div>
<!-- Form -->
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">E-mail de Acesso</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none text-slate-900 dark:text-white transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="seu@email.com" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl transition-all neon-glow flex items-center justify-center gap-2 group">
<span>Enviar Instruções</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">send</span>
</button>
</div>
<!-- Footer Info -->
<div class="mt-auto pt-10 text-center">
<p class="text-sm text-slate-500 dark:text-slate-500 mb-6">
                    Ainda não possui uma conta? <a class="text-primary hover:underline font-medium" href="#">Criar conta Quantum</a>
</p>
<!-- Decoration -->
<div class="flex justify-center items-center gap-4 opacity-30">
<div class="h-px w-12 bg-slate-400"></div>
<span class="material-symbols-outlined text-xs">auto_awesome</span>
<div class="h-px w-12 bg-slate-400"></div>
</div>
</div>
</div>
<!-- Background Ambient Effects -->
<div class="fixed bottom-0 left-0 right-0 h-[300px] pointer-events-none overflow-hidden z-[-1]">
<div class="absolute -bottom-20 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-primary/10 blur-[120px] rounded-full"></div>
</div>
</div>
</body></html>

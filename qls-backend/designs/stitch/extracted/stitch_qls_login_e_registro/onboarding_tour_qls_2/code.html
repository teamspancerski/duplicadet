<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&amp;family=Outfit:wght@300;400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ff88",
                        "background-dark": "#0a0a0a",
                        "glass-bg": "rgba(10, 10, 10, 0.75)",
                    },
                    fontFamily: {
                        "display": ["Syncopate", "sans-serif"],
                        "body": ["Outfit", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .glass-panel {
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 136, 0.15);
        }
        .dimmed-overlay {
            background: rgba(5, 5, 5, 0.9);
        }
        .geometric-btn {
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-body text-slate-100 antialiased overflow-hidden h-screen">
<div class="fixed inset-0 z-0 p-4 opacity-30 pointer-events-none">
<div class="flex items-center justify-between mb-8">
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
<div class="text-primary font-display font-bold text-xs tracking-[0.2em]">QLS QUANTUM</div>
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary">notifications</span>
</div>
</div>
<div class="w-full h-36 rounded-2xl bg-primary/5 border border-primary/10 mb-6 flex flex-col p-5">
<div class="text-[10px] text-primary/60 font-display font-bold uppercase tracking-[0.15em] mb-1">Saldo Total</div>
<div class="text-3xl font-black text-white tracking-tight">$ 124,500.00</div>
<div class="mt-auto h-1.5 w-full bg-primary/10 rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-primary shadow-[0_0_10px_#00ff88]"></div>
</div>
</div>
<div class="w-full aspect-[4/3] rounded-2xl border border-primary/10 bg-primary/5 p-4">

<div class="w-full bg-primary/10 h-[30%] rounded-sm"></div>
<div class="w-full bg-primary/10 h-[50%] rounded-sm"></div>
<div class="w-full bg-primary/20 h-[70%] rounded-sm"></div>
<div class="w-full bg-primary/40 h-[40%] rounded-sm"></div>

<div class="w-full bg-primary/10 h-[60%] rounded-sm"></div>
</div>
</div>
</div>
<div class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 dimmed-overlay">

<div class="h-1 w-10 bg-primary shadow-[0_0_8px_#00ff88]"></div>
<div class="h-1 w-10 bg-white/10"></div>

</div>
<div class="glass-panel w-full max-w-sm rounded-3xl p-8 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative">

<div class="size-24 rounded-3xl bg-primary/10 flex items-center justify-center border border-primary/30 relative">

</div>
</div>
<div class="text-center mb-10">

                </h2>

                </p>

<div class="flex flex-col gap-4">
<button class="w-full py-5 bg-primary text-background-dark font-display font-bold text-sm tracking-widest uppercase hover:opacity-90 transition-all flex items-center justify-center gap-3 geometric-btn">

                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<button class="w-full py-3 text-primary font-display font-bold text-[10px] tracking-[0.25em] uppercase border-b border-primary/20 hover:border-primary transition-all">

                </button>

<div class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-6 h-6 rotate-45 glass-panel border-t-0 border-l-0 shadow-xl"></div>

</div>
</div>
</div>

<span class="material-symbols-outlined">dashboard</span>
<span class="text-[9px] font-display font-bold tracking-widest uppercase">Dash</span>
</div>
<div class="flex flex-col items-center gap-1.5 text-white/30">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[9px] font-display font-bold tracking-widest uppercase">Wallet</span>
</div>
<div class="flex flex-col items-center gap-1.5 text-white/30">
<span class="material-symbols-outlined">settings</span>
<span class="text-[9px] font-display font-bold tracking-widest uppercase">Config</span>
</div>
</div>
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-36 h-1.5 bg-white/10 rounded-full z-[60]"></div>

</body></html>

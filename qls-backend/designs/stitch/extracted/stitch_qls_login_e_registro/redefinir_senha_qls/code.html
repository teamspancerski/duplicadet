<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Redefinir Senha QLS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ff66",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 102, 0.1);
        }
        .neon-shadow {
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }
        .neon-text-shadow {
            text-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<div class="flex items-center p-6 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Redefinir Senha</h2>
</div>
<div class="flex-1 flex flex-col px-6">
<!-- Brand Logo Area -->
<div class="flex flex-col items-center py-8">
<div class="relative w-24 h-24 mb-6">
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
<div class="relative w-full h-full flex items-center justify-center glass-card rounded-2xl border-primary/30">
<span class="material-symbols-outlined text-primary text-6xl neon-text-shadow">bolt</span>
</div>
</div>
<h1 class="text-3xl font-bold tracking-tight text-center bg-gradient-to-r from-white to-primary bg-clip-text text-transparent">Quantum Liquidity</h1>
<p class="text-slate-400 text-sm mt-2 font-light">Recupere o acesso ao seu terminal</p>
</div>
<!-- Form Container -->
<div class="space-y-6">
<!-- Step 1: Email Input -->
<div class="glass-card p-5 rounded-2xl space-y-4">
<div class="flex items-center gap-3">
<div class="flex h-8 w-8 items-center justify-center rounded-full bg-primary/20 text-primary text-sm font-bold">1</div>
<h3 class="font-semibold">Identificação</h3>
</div>
<div class="space-y-2">
<label class="text-xs font-medium uppercase tracking-wider text-slate-500 ml-1">E-mail de Cadastro</label>
<div class="relative">
<input class="w-full bg-slate-900/50 border border-slate-800 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl h-14 pl-12 text-slate-100 transition-all" placeholder="exemplo@qls.com" type="email"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">mail</span>
</div>
</div>
</div>
<!-- Step 2: Verification & New Password -->
<div class="glass-card p-5 rounded-2xl space-y-4 opacity-50">
<div class="flex items-center gap-3">
<div class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-800 text-slate-400 text-sm font-bold">2</div>
<h3 class="font-semibold text-slate-400">Nova Senha</h3>
</div>
<div class="grid grid-cols-4 gap-3 py-2">
<input class="h-12 w-full text-center bg-slate-900/50 border border-slate-800 rounded-lg text-xl font-bold text-primary" disabled="" maxlength="1" type="text"/>
<input class="h-12 w-full text-center bg-slate-900/50 border border-slate-800 rounded-lg text-xl font-bold text-primary" disabled="" maxlength="1" type="text"/>
<input class="h-12 w-full text-center bg-slate-900/50 border border-slate-800 rounded-lg text-xl font-bold text-primary" disabled="" maxlength="1" type="text"/>
<input class="h-12 w-full text-center bg-slate-900/50 border border-slate-800 rounded-lg text-xl font-bold text-primary" disabled="" maxlength="1" type="text"/>
</div>
<div class="space-y-3">
<div class="relative">
<input class="w-full bg-slate-900/50 border border-slate-800 rounded-xl h-14 pl-12 text-slate-100" disabled="" placeholder="Nova senha" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">lock</span>
</div>
<div class="relative">
<input class="w-full bg-slate-900/50 border border-slate-800 rounded-xl h-14 pl-12 text-slate-100" disabled="" placeholder="Confirmar nova senha" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">shield</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-auto pb-10 pt-8">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg h-16 rounded-2xl transition-all active:scale-95 neon-shadow flex items-center justify-center gap-2">
<span>Enviar Código</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-slate-500 text-sm mt-6">
                    Lembrou sua senha? <a class="text-primary font-bold hover:underline" href="#">Fazer Login</a>
</p>
</div>
</div>
<!-- Decorative background elements -->
<div class="absolute top-0 right-0 -z-10 w-64 h-64 bg-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-0 left-0 -z-10 w-96 h-96 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
</div>
</body></html>

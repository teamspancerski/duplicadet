<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(13, 242, 242, 0.3);
        }
        .neon-border {
            border: 1px solid rgba(13, 242, 242, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-start rounded-full active:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[28px]">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Redefinir Senha</h2>
</div>
<!-- Progress Indicator -->
<div class="px-4 py-4 flex gap-2">
<div class="h-1.5 flex-1 rounded-full bg-primary shadow-[0_0_8px_rgba(13,242,242,0.6)]"></div>
<div class="h-1.5 flex-1 rounded-full bg-slate-200 dark:bg-slate-800"></div>
<div class="h-1.5 flex-1 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</div>
<!-- Header Section -->
<div class="px-4 pt-6 pb-2">
<div class="mb-4 inline-flex items-center justify-center size-14 rounded-2xl bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl">lock_reset</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight">Esqueceu sua senha?</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed mt-2">
                Enviamos um código de 6 dígitos para o e-mail <span class="text-primary font-medium">al***@qls.com</span>. Por favor, insira-o abaixo.
            </p>
</div>
<!-- Verification Code Section -->
<div class="mt-8">
<h4 class="text-primary text-sm font-bold uppercase leading-normal tracking-widest px-4 mb-6 text-center">Código de Verificação</h4>
<div class="flex justify-center px-4 py-3">
<fieldset class="relative flex gap-3 sm:gap-4">
<input class="flex h-14 w-11 sm:w-14 text-center rounded-lg bg-slate-100 dark:bg-slate-900 border-2 border-transparent focus:border-primary focus:ring-0 text-xl font-bold text-primary transition-all neon-border" inputmode="numeric" max="9" maxlength="1" pattern="\d*" type="text"/>
<input class="flex h-14 w-11 sm:w-14 text-center rounded-lg bg-slate-100 dark:bg-slate-900 border-2 border-transparent focus:border-primary focus:ring-0 text-xl font-bold text-primary transition-all neon-border" inputmode="numeric" max="9" maxlength="1" pattern="\d*" type="text"/>
<input class="flex h-14 w-11 sm:w-14 text-center rounded-lg bg-slate-100 dark:bg-slate-900 border-2 border-transparent focus:border-primary focus:ring-0 text-xl font-bold text-primary transition-all neon-border" inputmode="numeric" max="9" maxlength="1" pattern="\d*" type="text"/>
<input class="flex h-14 w-11 sm:w-14 text-center rounded-lg bg-slate-100 dark:bg-slate-900 border-2 border-transparent focus:border-primary focus:ring-0 text-xl font-bold text-primary transition-all neon-border" inputmode="numeric" max="9" maxlength="1" pattern="\d*" type="text"/>
<input class="flex h-14 w-11 sm:w-14 text-center rounded-lg bg-slate-100 dark:bg-slate-900 border-2 border-transparent focus:border-primary focus:ring-0 text-xl font-bold text-primary transition-all neon-border" inputmode="numeric" max="9" maxlength="1" pattern="\d*" type="text"/>
<input class="flex h-14 w-11 sm:w-14 text-center rounded-lg bg-slate-100 dark:bg-slate-900 border-2 border-transparent focus:border-primary focus:ring-0 text-xl font-bold text-primary transition-all neon-border" inputmode="numeric" max="9" maxlength="1" pattern="\d*" type="text"/>
</fieldset>
</div>
<div class="text-center mt-6">
<button class="text-primary/80 hover:text-primary text-sm font-semibold tracking-wide transition-colors">
                    Não recebeu o código? <span class="underline decoration-primary/30">Reenviar</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="mt-auto px-4 pb-10 pt-8">
<button class="w-full h-14 bg-primary text-background-dark font-bold text-lg rounded-xl shadow-[0_0_20px_rgba(13,242,242,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Continuar</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
<!-- Security Info -->
<div class="flex items-center justify-center gap-2 mt-6 text-slate-500 dark:text-slate-500">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-xs uppercase tracking-tighter">Sessão Segura • QLS Protocol 2.4</span>
</div>
</div>
<!-- Decorative elements -->
<div class="fixed bottom-0 left-0 w-full h-32 pointer-events-none opacity-20 bg-gradient-to-t from-primary to-transparent"></div>
<div class="fixed top-20 -right-20 size-64 rounded-full bg-primary/5 blur-[100px] pointer-events-none"></div>
<div class="fixed -bottom-20 -left-20 size-64 rounded-full bg-primary/5 blur-[100px] pointer-events-none"></div>
</div>
</body></html>

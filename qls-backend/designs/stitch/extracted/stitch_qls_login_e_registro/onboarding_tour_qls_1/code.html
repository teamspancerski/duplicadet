<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06f967",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f2317",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(24, 53, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 249, 103, 0.2);
        }
        .dimmed-overlay {
            background: rgba(15, 35, 23, 0.85);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden h-screen">
<!-- Dashboard Background (Dimmed) -->
<div class="fixed inset-0 z-0 p-4 opacity-40 pointer-events-none">
<div class="flex items-center justify-between mb-6">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">account_circle</span>
</div>
<div class="text-primary font-bold">QLS Quantum</div>
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">notifications</span>
</div>
</div>
<!-- Mock Stats Card -->
<div class="w-full h-32 rounded-xl bg-primary/10 border border-primary/20 mb-4 flex flex-col p-4">
<div class="text-xs text-primary/60 uppercase tracking-widest">Saldo Total</div>
<div class="text-3xl font-bold text-white">$ 124,500.00</div>
<div class="mt-auto h-1 w-full bg-primary/20 rounded-full overflow-hidden">
<div class="h-full w-2/3 bg-primary"></div>
</div>
</div>
<!-- Mock Graph Area -->
<div class="w-full aspect-[4/3] rounded-xl border border-primary/10 bg-primary/5 p-4">
<div class="w-full h-full flex items-end gap-1">
<div class="w-full bg-primary/20 h-[30%] rounded-t"></div>
<div class="w-full bg-primary/20 h-[50%] rounded-t"></div>
<div class="w-full bg-primary/40 h-[70%] rounded-t"></div>
<div class="w-full bg-primary/60 h-[40%] rounded-t"></div>
<div class="w-full bg-primary h-[90%] rounded-t"></div>
<div class="w-full bg-primary/30 h-[60%] rounded-t"></div>
</div>
</div>
</div>
<!-- Onboarding Overlay Layer -->
<div class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 dimmed-overlay">
<!-- Progress Dots -->
<div class="absolute top-16 flex gap-2">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-8 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-8 rounded-full bg-primary/20"></div>
</div>
<!-- Tooltip Card -->
<div class="glass-panel w-full max-w-sm rounded-2xl p-6 shadow-2xl relative">
<!-- Icon/Visual Element -->
<div class="mb-6 flex justify-center">
<div class="size-20 rounded-2xl bg-primary/10 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-5xl text-primary">api</span>
</div>
</div>
<!-- Content -->
<div class="text-center mb-8">
<h2 class="text-white text-2xl font-bold mb-3">Conecte sua API</h2>
<p class="text-primary/70 text-base leading-relaxed">
                    Vincule sua chave de API com segurança militar para começar a operar no mercado quântico de forma automatizada.
                </p>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3">
<button class="w-full py-4 rounded-xl bg-primary text-background-dark font-bold text-lg hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                    Próximo
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full py-3 rounded-xl border border-primary/30 text-primary font-medium text-sm hover:bg-primary/5 transition-colors">
                    Pular Tour
                </button>
</div>
<!-- Tooltip Pointer (CSS Triangle) -->
<div class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-6 h-6 rotate-45 glass-panel border-t-0 border-l-0"></div>
</div>
<!-- Visual Pointer to UI element (Simulated) -->
<div class="mt-12 flex flex-col items-center">
<div class="w-px h-16 bg-gradient-to-b from-primary to-transparent opacity-50"></div>
<div class="size-12 rounded-full border-2 border-primary animate-pulse flex items-center justify-center">
<div class="size-4 rounded-full bg-primary"></div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Mockup for iOS feel) -->
<div class="fixed bottom-0 left-0 right-0 h-20 bg-background-dark/80 backdrop-blur-md border-t border-primary/10 px-8 flex items-center justify-between z-10 pointer-events-none opacity-40">
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px] uppercase font-bold">Dashboard</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary/40">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] uppercase font-bold">Carteira</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary/40">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] uppercase font-bold">Ajustes</span>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full z-[60]"></div>
</body></html>

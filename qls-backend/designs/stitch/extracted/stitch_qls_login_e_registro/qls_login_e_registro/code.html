<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QLS Login e Registro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ff66",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(23, 54, 35, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 102, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between p-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">language</span>
<span class="text-sm font-medium tracking-wide">PT-BR</span>
</div>
<div class="flex items-center gap-1">
<span class="text-xs font-bold text-primary/60 uppercase tracking-widest">Quantum Liquidity</span>
</div>
</header>
<!-- Logo Section -->
<div class="flex flex-col items-center justify-center pt-8 pb-10">
<div class="relative w-32 h-32 flex items-center justify-center rounded-full bg-primary/10 neon-glow">
<span class="material-symbols-outlined text-primary text-7xl" style="font-variation-settings: 'FILL' 1">bolt</span>
<div class="absolute inset-0 rounded-full border-2 border-primary/20 animate-pulse"></div>
</div>
<h1 class="mt-6 text-4xl font-bold tracking-tight text-white">QLS <span class="text-primary text-xl align-top">®</span></h1>
<p class="text-slate-400 text-sm mt-1">Trading de Alta Frequência</p>
</div>
<!-- Main Form Container -->
<main class="flex-1 px-6 pb-12">
<div class="glass rounded-xl p-1 mb-8 flex">
<button class="flex-1 py-3 text-sm font-bold rounded-lg bg-primary text-background-dark transition-all">Login</button>
<button class="flex-1 py-3 text-sm font-bold text-slate-400 hover:text-white transition-all">Registro</button>
</div>
<div class="glass rounded-xl p-6 space-y-6">
<!-- Inputs -->
<div class="space-y-4">
<div class="space-y-2">
<label class="text-xs font-semibold text-primary/70 uppercase px-1">E-mail</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-500 text-xl">mail</span>
<input class="w-full bg-background-dark/50 border border-primary/20 rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-slate-600 focus:outline-none focus:border-primary transition-colors" placeholder="nome@exemplo.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold text-primary/70 uppercase px-1">Senha</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-500 text-xl">lock</span>
<input class="w-full bg-background-dark/50 border border-primary/20 rounded-lg py-4 pl-12 pr-12 text-white placeholder:text-slate-600 focus:outline-none focus:border-primary transition-colors" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-slate-500 text-xl cursor-pointer">visibility</span>
</div>
</div>
</div>
<!-- 2FA Toggle -->
<div class="flex items-center justify-between py-2 border-y border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">security</span>
<span class="text-sm font-medium">Ativar 2FA</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Plan Toggle (Stripe-like) -->
<div class="bg-background-dark/40 rounded-lg p-3">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-xs font-bold text-slate-400 uppercase">Plano Atual</span>
<span class="text-lg font-bold text-white" id="plan-label">Free Account</span>
</div>
<div class="flex bg-slate-800 rounded-full p-1 border border-primary/10">
<button class="px-4 py-1 text-xs font-bold rounded-full bg-primary text-background-dark">FREE</button>
<button class="px-4 py-1 text-xs font-bold rounded-full text-slate-400">PRO</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary py-4 rounded-xl font-bold text-background-dark text-lg shadow-lg neon-glow active:scale-[0.98] transition-all">
                    Acessar Terminal
                </button>
<div class="text-center">
<a class="text-sm text-slate-500 hover:text-primary transition-colors" href="#">Esqueceu sua senha?</a>
</div>
</div>
<!-- Social Login -->
<div class="mt-8">
<div class="flex items-center gap-4 mb-6">
<div class="h-[1px] flex-1 bg-primary/10"></div>
<span class="text-xs text-slate-500 font-bold uppercase">Ou entre com</span>
<div class="h-[1px] flex-1 bg-primary/10"></div>
</div>
<div class="flex gap-4">
<button class="flex-1 glass py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-xl">account_balance_wallet</span>
<span class="text-sm font-medium">Wallet</span>
</button>
<button class="flex-1 glass py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-xl">fingerprint</span>
<span class="text-sm font-medium">Biometria</span>
</button>
</div>
</div>
</main>
<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 right-0 glass border-t border-primary/20 px-6 py-4 flex justify-between items-center z-50">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Início</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">monitoring</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Mercado</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Carteira</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Ajustes</span>
</a>
</nav>
<!-- Background Decorations -->
<div class="fixed top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-10%] w-[250px] h-[250px] bg-primary/10 rounded-full blur-[80px] -z-10"></div>
</div>
</body></html>
